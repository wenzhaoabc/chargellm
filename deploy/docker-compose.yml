services:
  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    env_file:
      - path: ../backend/.env.example
        required: true
      - path: ../backend/.env
        required: false
    environment:
      DATABASE_URL: sqlite:////app/data/chargellm_demo.db
      DATA_DIR: /app/data
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  backend_data:
